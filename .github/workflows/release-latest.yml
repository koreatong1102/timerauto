name: Build latest release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-latest:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable package
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          $source = Get-Content -Raw timerauto.py
          $source = $source -replace 'APP_VERSION = "[^"]+"', "APP_VERSION = `"$version`""
          Set-Content -LiteralPath timerauto.py -Value $source -Encoding UTF8
          .\build_release.ps1 -Version $version

      - name: Prepare latest release files
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          $sourceZip = "release\TimerAuto_v${version}_portable.zip"
          $latestZip = "release\TimerAuto_latest_portable.zip"
          $legacyZip = "release\TimerAuto_latest_legacy_update.zip"
          $legacyDir = "release\legacy_update"
          Copy-Item -LiteralPath $sourceZip -Destination $latestZip -Force

          if (Test-Path $legacyDir) {
            Remove-Item -LiteralPath $legacyDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $legacyDir | Out-Null
          Get-ChildItem -LiteralPath "dist\timerauto" -Force |
            Where-Object { $_.Name -ne "_internal" } |
            ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination $legacyDir -Recurse -Force
            }
          if (Test-Path $legacyZip) {
            Remove-Item -LiteralPath $legacyZip -Force
          }
          Compress-Archive -Path (Join-Path $legacyDir "*") -DestinationPath $legacyZip -Force

          # Existing 1.0.0 installs can have an older Python runtime in
          # _internal.  Always advertise the full portable package so updates
          # replace runtime DLLs as well as app files.
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $latestZip).Hash.ToLowerInvariant()
          $repo = "${{ github.repository }}"
          $metadata = [ordered]@{
            version = $version
            url = "https://github.com/$repo/releases/download/latest/TimerAuto_latest_portable.zip"
            notes = "TimerAuto $version"
            sha256 = $hash
          }
          $metadata | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath "release\latest.json" -Encoding UTF8

      - name: Publish latest release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f latest
          git push origin latest --force

          gh release upload latest `
            "release\TimerAuto_latest_portable.zip" `
            "release\TimerAuto_latest_legacy_update.zip" `
            "release\latest.json" `
            --clobber

          if ($LASTEXITCODE -eq 0) {
            gh release edit latest `
              --title "TimerAuto latest" `
              --notes "Automatic latest build from ${{ github.sha }}" `
              --latest
          } else {
            gh release create latest `
              "release\TimerAuto_latest_portable.zip" `
              "release\TimerAuto_latest_legacy_update.zip" `
              "release\latest.json" `
              --title "TimerAuto latest" `
              --notes "Automatic latest build from ${{ github.sha }}" `
              --latest
          }
